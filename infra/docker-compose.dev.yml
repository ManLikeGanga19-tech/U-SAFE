# U-SAFE KE — local development stack.
# Run from repo root:  docker compose -f infra/docker-compose.dev.yml --env-file .env up -d --build
name: usafe-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: usafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usafe_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-usafe}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - usafe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usafe} -d ${POSTGRES_DB:-usafe}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: usafe-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: usafe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-usafe_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-usafe_minio_pw}
    ports:
      - "${MINIO_API_HOST_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9003}:9001"
    volumes:
      - usafe_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: usafe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-usafe_minio} ${S3_SECRET_KEY:-usafe_minio_pw} &&
      mc mb --ignore-existing local/${S3_BUCKET:-usafe-media} &&
      mc anonymous set download local/${S3_BUCKET:-usafe-media} &&
      echo 'bucket ready';
      "
    restart: "no"

  api:
    build:
      context: ../services/api
    container_name: usafe-api
    restart: unless-stopped
    env_file: ../.env
    environment:
      RUN_MIGRATIONS: "1"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8000"
    volumes:
      - ../services/api:/app
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../services/api
    container_name: usafe-worker
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: ../.env
    environment:
      RUN_MIGRATIONS: "0"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ../services/api:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/frontend.dev.Dockerfile
    container_name: usafe-web
    restart: unless-stopped
    command: ["pnpm", "--filter", "@usafe/web", "dev"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8080}
      API_INTERNAL_URL: http://api:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ..:/workspace
      - usafe_root_node_modules:/workspace/node_modules
      - usafe_web_node_modules:/workspace/apps/web/node_modules
      - usafe_admin_node_modules:/workspace/apps/admin/node_modules
    depends_on:
      api:
        condition: service_started

  admin:
    build:
      context: ..
      dockerfile: infra/frontend.dev.Dockerfile
    container_name: usafe-admin
    restart: unless-stopped
    command: ["pnpm", "--filter", "@usafe/admin", "dev"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8080}
      API_INTERNAL_URL: http://api:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    volumes:
      - ..:/workspace
      - usafe_root_node_modules:/workspace/node_modules
      - usafe_web_node_modules:/workspace/apps/web/node_modules
      - usafe_admin_node_modules:/workspace/apps/admin/node_modules
    depends_on:
      api:
        condition: service_started

  # Opt-in public tunnel for testing real M-Pesa (Daraja) callbacks locally.
  # Start with: docker compose -f infra/docker-compose.dev.yml --profile tunnel up -d ngrok
  # Uses a RESERVED ngrok domain so MPESA_CALLBACK_URL is stable across restarts.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: usafe-ngrok
    profiles: ["tunnel"]
    command: ["http", "api:8000", "--url=https://${NGROK_DOMAIN}"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040" # ngrok inspection dashboard
    depends_on:
      api:
        condition: service_started

volumes:
  usafe_pg_data:
  usafe_minio_data:
  usafe_root_node_modules:
  usafe_web_node_modules:
  usafe_admin_node_modules:
